name: PR Review with Agent Merge

# Label workflow:
#   agent-merge-allow       - Developer adds to opt-in to auto-merge
#   agent-merge-approved    - Agent adds when review passes
#   agent-changes-requested - Agent adds when issues are found
#   agent-auto-merged       - Agent adds after auto-merging (tracking)

on:
  pull_request:
    types: [opened, synchronize, ready_for_review, reopened, labeled]

jobs:
  # Job 1: Claude reviews PR on code changes
  review:
    if: github.event.action != 'labeled'
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
      id-token: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@v5
        with:
          # Full history so `git merge-base origin/main HEAD` works in the review prompt.
          fetch-depth: 0

      - name: Review PR
        uses: anthropics/claude-code-action@v1
        with:
          claude_code_oauth_token: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}

          # Use sticky comment to reuse the same comment on each push
          use_sticky_comment: true

          # Enable progress tracking
          track_progress: true

          # Custom review instructions
          prompt: |
            REPO: ${{ github.repository }}
            PR NUMBER: ${{ github.event.pull_request.number }}

            You are performing a code review on this PR. Follow these steps:

            **Step 1 — Determine diff scope:** Use `git merge-base origin/main HEAD` to find the merge base, then `git diff <merge-base>...HEAD` for branch changes.

            **Step 2 — Read changed files:** Read the full current version of each changed source file (`.py`, `.yml`, `.sh`, `.md`). Skip binary, lock, and generated files.

            **Step 3 — Load repo-specific patterns:** Read `CLAUDE.md` and `CONTRIBUTING.md` for project conventions. Note especially the checklist in CONTRIBUTING.md ("New Feature Checklist") and the tests/CLAUDE.md standards for test organization.

            **Step 4 — Review for:**
            - Security vulnerabilities (auth/authorization, input validation, injection risks)
            - Bugs and logic errors
            - Performance issues (N+1 queries, memory leaks)
            - Missing error handling or edge cases
            - Breaking changes or API compatibility issues (this is a library — breaking changes matter a lot)
            - Missing or inadequate tests (unit + integration + regression per CONTRIBUTING.md)
            - Demo not updated when adding a user-facing feature (per CONTRIBUTING.md checklist)

            **Guidelines:** Only report actual problems. Be specific and actionable. Use inline comments for code-specific issues. Skip praise, style nitpicks, or general observations. One to two sentences per issue. Do NOT duplicate comments already posted.

            ## Post-Review Actions

            After completing your review, follow these steps:

            **Step 1:** Check which labels exist on this PR:
            `gh pr view ${{ github.event.pull_request.number }} --json labels --jq '.labels[].name'`

            **Step 2a - If you found critical issues that must be fixed:**
            - Add the `agent-changes-requested` label
            - Remove the `agent-merge-approved` label if present
            - Disable auto-merge if it was previously enabled
            - Do NOT approve or merge regardless of what labels exist
            ```
            gh pr edit ${{ github.event.pull_request.number }} --add-label "agent-changes-requested" --remove-label "agent-merge-approved"
            gh pr merge ${{ github.event.pull_request.number }} --disable-auto
            ```

            **Step 2b - If the PR looks good (no critical issues):**
            - Add `agent-merge-approved` label
            - Remove `agent-changes-requested` label if present
            ```
            gh pr edit ${{ github.event.pull_request.number }} --add-label "agent-merge-approved" --remove-label "agent-changes-requested"
            ```

            **Step 3 - Approve and auto-merge (only if `agent-merge-allow` label exists):**
            If the `agent-merge-allow` label is present AND you had no critical issues:
            ```
            gh pr review ${{ github.event.pull_request.number }} --approve --body "Agent approved - no critical issues found."
            gh pr merge ${{ github.event.pull_request.number }} --squash --auto
            gh pr edit ${{ github.event.pull_request.number }} --add-label "agent-auto-merged"
            ```

            If `agent-merge-allow` is NOT present, do NOT approve or merge. Just leave your review comments and labels for the team.

          # Tools for comprehensive PR review
          claude_args: |
            --model opus
            --allowedTools "Read,Grep,Glob,mcp__github_inline_comment__create_inline_comment,Bash(gh pr comment:*),Bash(gh pr diff:*),Bash(gh pr view:*),Bash(gh pr review:*),Bash(gh pr edit:*),Bash(gh pr merge:*),Bash(git diff:*),Bash(git merge-base:*),Bash(git rev-parse:*)"

  # Job 2: Auto-merge when label is added (no Claude needed, just bash)
  auto-merge:
    if: github.event.action == 'labeled' && github.event.label.name == 'agent-merge-allow'
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
    steps:
      - name: Check labels and auto-merge
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          PR_NUMBER=${{ github.event.pull_request.number }}
          echo "Checking if PR #${PR_NUMBER} can be auto-merged..."

          # Get current labels
          LABELS=$(gh pr view $PR_NUMBER --repo ${{ github.repository }} --json labels --jq '.labels[].name')
          echo "Current labels: $LABELS"

          # Verify agent-merge-allow is still present (guard against race condition)
          if ! echo "$LABELS" | grep -q "agent-merge-allow"; then
            echo "agent-merge-allow label was removed. Skipping auto-merge."
            exit 0
          fi

          # Check if agent-merge-approved exists
          if ! echo "$LABELS" | grep -q "agent-merge-approved"; then
            echo "PR does not have agent-merge-approved label yet. Waiting for review to complete."
            exit 0
          fi

          # Check if agent-changes-requested exists (shouldn't merge if so)
          if echo "$LABELS" | grep -q "agent-changes-requested"; then
            echo "PR has agent-changes-requested label. Skipping auto-merge."
            exit 0
          fi

          # Approve and enable auto-merge
          gh pr review $PR_NUMBER --repo ${{ github.repository }} --approve --body "Auto-merge triggered by agent-merge-allow label."
          gh pr merge $PR_NUMBER --repo ${{ github.repository }} --squash --auto
          gh pr edit $PR_NUMBER --repo ${{ github.repository }} --add-label "agent-auto-merged"

          echo "Auto-merge enabled for PR #${PR_NUMBER}"
