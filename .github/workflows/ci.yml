name: CI

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main
  merge_group:

jobs:
  lint:
    name: Lint & Type Check
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.14'
          cache: 'pip'

      - name: Install dependencies
        run: pip install -e ".[dev]"

      - name: Ruff format check
        run: ruff format --check .

      - name: Ruff lint
        run: ruff check .

      # TODO: Drop continue-on-error once the 3 pre-existing `None.model`
      # errors in schema.py (lines ~251/280/316) are fixed. Kept non-blocking
      # so CI can land without bundling a type-fix PR.
      - name: mypy
        run: mypy djangorestframework_mcp
        continue-on-error: true

  test:
    name: Test (py${{ matrix.python-version }} / Django ${{ matrix.django-version }})
    runs-on: ubuntu-latest

    strategy:
      fail-fast: false
      matrix:
        # Internal use only — we run on Python 3.14 + Django 5.2 / 6.0.
        # If this library ever goes public, expand the matrix back out to
        # Python 3.9–3.13 × Django 4.2/5.2/6.0 (see git history for the
        # full matrix).
        python-version: ['3.14']
        django-version: ['5.2', '6.0']

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: 'pip'

      - name: Install dependencies
        run: |
          pip install -e ".[dev]"
          pip install "Django~=${{ matrix.django-version }}.0" django-filter

      - name: Log resolved versions
        run: |
          python --version
          python -c "import django; print('Django', django.get_version())"
          python -c "import rest_framework; print('DRF', rest_framework.VERSION)"
          python -c "import django_filters; print('django-filter', django_filters.__version__)"

      - name: Run tests with coverage
        run: |
          python -m coverage run -m pytest -v
          python -m coverage xml
          python -m coverage report

      - name: Upload coverage report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: coverage-py${{ matrix.python-version }}-dj${{ matrix.django-version }}
          path: coverage.xml
